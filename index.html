<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JS -DOM - API</title>

    <!-- Tailwind & DaisyUI -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- CSS -->
    <link rel="stylesheet" href="index.css">

    <!-- fontawesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>

<body>

    <main class="container mx-auto text-center mt-[100px]">
        <h2 class="font-bold text-4xl primaryColor mb-5">Choose Your Trees</h2>
        <div class="grid grid-cols-12 gap-8">
            <!-- Categories -->
            <div class="font-bold text-2xl col-span-3 card card-body shadow-xl ">
                Categories
                <div class="sticky top-8">
                    <button id="allTressBtn" class="btn bgPrimary my-4 w-full">All Trees</button>

                    <!-- Categorie Container -->
                    <div id="categoriesContainer" class="space-y-3">
                        <!-- Categories will be dynamically loaded here by API -->

                    </div>
                </div>
            </div>

            <!-- Trees -->
            <div class="col-span-6  ">
                <div id="treesContainer" class="grid grid-cols-1 sm:grid-cols-2 gap-6">


                </div>
                <!-- loading spinner -->
                <div id="loadingSpinner" class="h-[60vh] hidden justify-center items-center">
                    <span class="loading loading-dots loading-xl"></span>

                </div>
            </div>



            <!-- Cart -->
            <div class="col-span-3 ">
                <h2 class="font-bold text-3xl mb-2"><i class="fa-solid fa-cart-arrow-down"></i> Cart</h2>
                <div class="space-y-4">
                    <div id="cartContainer" class="space-y-4">
                        <!-- <div class="card card-body shadow-2xl">
                            <div class="flex justify-between items-center">
                                <div>
                                    <h2>Name</h2>
                                    <p>৳2000 * 10</p>
                                </div>
                                <button class="btn btn-ghost"><i class="fa-solid fa-x"></i></button>
                            </div>
                            <p class="text-right font-semibold text-xl">৳500</p>

                        </div> -->
                    </div>

                    <div id="emptyCartMessage" class="text-cent py-4">
                        <p>Your cart is empty</p>
                        <p>Add trees to get started</p>

                    </div>

                    <!-- Total amount -->
                    <div class="flex justify-between items-center bg-green-300 rounded-lg p-4 my-3 font-bold">
                        <span>Total</span>


                        <p id="totalPrice">৳ 0</p>

                    </div>

                </div>
            </div>
        </div>
    </main>

    <!-- Product Details Modal -->
    <!-- Open the modal using ID.showModal() method -->
    <button class="btn" onclick="tree_details_modal.showModal()">open modal</button>
    <dialog id="tree_details_modal" class="modal modal-bottom sm:modal-middle">
        <div class="modal-box">
            <!-- Modal Header with close Button -->
            <div class="flex justify-between items-start mb-4">
                <h3 id="modalTitle" class="font-bold text-2xl text-green-700">Tree Details</h3>
                <button class="btn btn-sm btn-circle btn-ghost"
                    onclick="document.getElementById('tree_details_modal').close()"><i
                        class="fa-solid fa-x"></i></button>
            </div>

            <!-- Modal Content -->
            <div class="gap-6">
                <!-- Plant Image -->
                <img id="modalImage" src="" alt="plat" class="w-full !h-[250px] object-cover rounded-lg mb-12">
            </div>

            <div class="">
                <p class="text-sm text-gray-500 mb-2">
                    <span class="font-bold">Category:</span>
                    <span id="modalCategory"></span>
                </p>
                <p class="text-sm text-gray-600 mb-4">
                    <span id="modalDescription"></span>
                </p>
                <div class="flex items-baseline gap-2 mb-6">
                    <span class="text-3xl font-bold text-green-600">৳<span id="modalPrice">0</span></span>
                </div>

            </div>


        </div>
    </dialog>


    <script src="./script/index.js"></script>
</body>

</html>
